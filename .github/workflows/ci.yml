name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  tier-a:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install minimal deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-minimal.txt -r requirements-dev.txt
      - name: Unit tests
        run: pytest tests/ -q
        env:
          PYTHONPATH: src
      - name: Import smoke
        run: python -c "from proferio import AppConfig"
        env:
          PYTHONPATH: src
      - name: Pipeline smoke (fallback)
        run: python scripts/smoke_test.py --backend fallback --no-persist-index
        env:
          PYTHONPATH: src
      - name: Golden eval (fallback)
        run: python scripts/evaluate_golden.py --backend fallback --no-persist-index
        env:
          PYTHONPATH: src
      - name: Compile check
        run: python -m compileall src scripts tests -q
